name: flutter_app_liftmove
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '^3.10.0'

dependencies:
  tuple: ^2.0.0
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  google_fonts: ^6.2.1
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_purple.png
    - assets/images/logo_purple.svg
    - assets/images/hombre_survey.svg
    - assets/images/mujer_survey.svg
    - assets/walking_login.json
    - assets/images/human_resources/
  fonts:
    - family: HeuvelGrotesk
      fonts:
        - asset: assets/fonts/HeuvelGroteskDEMO-Black.ttf

flutter_native_splash:
  color: "#6666ff"
  image: assets/images/logo_white.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center